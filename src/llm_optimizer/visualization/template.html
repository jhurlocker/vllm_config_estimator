            <div id="root" class="w-screen min-h-screen"></div>

    <script type="module">
        // Import React, ReactDOM, and Lucide React components via ESM
        import React, { useEffect, useMemo, useRef, useState } from 'https://esm.sh/react@18?dev';
        import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
        import { BarChart3, Info, Copy, Settings } from 'https://esm.sh/lucide-react@0.363.0?bundle&deps=react@18&dev';
        import * as echarts from 'https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.esm.min.js';

        // Embedded data/config from backend
        const data = {data_json};
        const constraints = {constraints_json};
        const config = {config_json};
        const fieldOptions = {field_options_json};
        const fieldCategories = {field_categories_json};
        const defaults = {defaults_json};
        const metadata = {metadata_json};
        const bestConfigs = {best_configs_json};

        const colors = config.visualization?.colors || [
            '#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe',
            '#00f2fe', '#43e97b', '#38f9d7', '#fa709a', '#fee140'
        ];

        // Get constraint field options from config
        function getConstraintFieldOptions() {
            const options = [];
            const constraintFields = ['ttft_ms', 'itl_ms', 'e2e_latency_ms', 'tpot_ms'];
            const statTypes = ['mean', 'median', 'p95', 'p99'];

            constraintFields.forEach(baseField => {
                statTypes.forEach(statType => {
                    const fieldName = `${statType}_${baseField}`;
                    const field = config.fields?.[fieldName];
                    if (field) {
                        options.push({ value: fieldName, label: field.label });
                    }
                });
            });

            return options;
        }

        const OPERATORS = config.constraint_operators || [
            { value: '<=', label: '≤ (at most)', description: 'Value must be less than or equal to' },
            { value: '>=', label: '≥ (at least)', description: 'Value must be greater than or equal to' },
            { value: '<', label: '< (less than)', description: 'Value must be strictly less than' },
            { value: '>', label: '> (greater than)', description: 'Value must be strictly greater than' }
        ];

        // Get relevant operators for a metric type
        function getRelevantOperators(metricName) {
            // All constraint fields are latency metrics, so only show < and <= operators
            return OPERATORS.filter(op => op.value === '<' || op.value === '<=');
        }

        function getParetoPoints(points) {
            const result = [];
            for (let i = 0; i < points.length; i++) {
                const p1 = points[i];
                let dominated = false;
                for (let j = 0; j < points.length; j++) {
                    if (i === j) continue;
                    const p2 = points[j];
                    const allGE = p2.x >= p1.x && p2.y >= p1.y;
                    const anyG = p2.x > p1.x || p2.y > p1.y;
                    if (allGE && anyG) { dominated = true; break; }
                }
                if (!dominated) result.push(p1);
            }
            return result;
        }

        // Helper to access nested data structure
        function getNestedValue(obj, path) {
            if (!path || !obj) return undefined;

            // Handle special mappings for common fields
            const mapping = {
                'input_throughput': 'results.input_throughput',
                'output_throughput': 'results.output_throughput',
                'mean_ttft_ms': 'results.mean_ttft_ms',
                'median_ttft_ms': 'results.median_ttft_ms',
                'p95_ttft_ms': 'results.p95_ttft_ms',
                'p99_ttft_ms': 'results.p99_ttft_ms',
                'mean_itl_ms': 'results.mean_itl_ms',
                'median_itl_ms': 'results.median_itl_ms',
                'p95_itl_ms': 'results.p95_itl_ms',
                'p99_itl_ms': 'results.p99_itl_ms',
                'mean_e2e_latency_ms': 'results.mean_e2e_latency_ms',
                'median_e2e_latency_ms': 'results.median_e2e_latency_ms',
                'p95_e2e_latency_ms': 'results.p95_e2e_latency_ms',
                'p99_e2e_latency_ms': 'results.p99_e2e_latency_ms',
                'mean_tpot_ms': 'results.mean_tpot_ms',
                'median_tpot_ms': 'results.median_tpot_ms',
                'p95_tpot_ms': 'results.p95_tpot_ms',
                'p99_tpot_ms': 'results.p99_tpot_ms',
                'max_concurrency': 'config.client_args.max_concurrency',
                'request_rate': 'config.client_args.request_rate',
                'cmd': 'cmd'
            };

            const actualPath = mapping[path] || path;

            // If not in mapping, check if it's a server arg
            if (!mapping[path]) {
                const serverArgValue = getPathValue(obj, `config.server_args.${path}`);
                if (serverArgValue !== undefined) {
                    return serverArgValue;
                }
            }

            return getPathValue(obj, actualPath);
        }

        // Helper function to traverse path
        function getPathValue(obj, path) {
            const keys = path.split('.');
            let current = obj;

            for (const key of keys) {
                if (current && typeof current === 'object' && key in current) {
                    current = current[key];
                } else {
                    return undefined;
                }
            }
            return current;
        }

        function checkConstraints(point, dynamicConstraints) {
            const constraintsToCheck = dynamicConstraints || constraints;
            // If no constraints, all points satisfy
            if (!constraintsToCheck || (Array.isArray(constraintsToCheck) && constraintsToCheck.length === 0)) return true;
            const getVal = (p, name) => {
                return getNestedValue(p, name);
            };
            const evalOp = (lhs, op, rhs) => {
                switch (op) {
                    case '>': return lhs > rhs;
                    case '>=': return lhs >= rhs;
                    case '<': return lhs < rhs;
                    case '<=': return lhs <= rhs;
                    case '==':
                    case '=': return lhs === rhs;
                    case '!=': return lhs !== rhs;
                    default: return true; // unknown op -> ignore
                }
            };
            if (Array.isArray(constraintsToCheck)) {
                return constraintsToCheck.every(c => {
                    if (!c || c.name == null) return true;
                    const lhs = Number(getVal(point, c.name));
                    const rhs = Number(c.value);
                    if (Number.isNaN(lhs) || Number.isNaN(rhs)) return false;
                    return evalOp(lhs, String(c.op || '>=').trim(), rhs);
                });
            }
            return true;
        }

        // Helper function to get field labels for constraints
        function getFieldLabel(fieldName) {
            const field = config.fields?.[fieldName];
            return field ? field.label : fieldName;
        }

        // Calculate best configuration dynamically based on current constraints
        function calculateBestConfig(data, constraints, throughputField) {
            if (!data || data.length === 0) return null;

            // Filter data that satisfies constraints
            const validConfigs = !constraints || constraints.length === 0 ?
                data : data.filter(item => checkConstraints(item, constraints));

            if (validConfigs.length === 0) return null;

            // Find the config with highest throughput
            let bestConfig = null;
            let bestThroughput = -1;

            validConfigs.forEach(item => {
                const throughput = item.results?.[throughputField];
                if (throughput && throughput > bestThroughput) {
                    bestThroughput = throughput;
                    bestConfig = item;
                }
            });

            return bestConfig ? {
                throughput: bestThroughput,
                config: bestConfig.config,
                cmd: bestConfig.cmd,
                originalData: bestConfig
            } : null;
        }

        function addConstraintLines(traces, xAxis, yAxis, transformedData) {
            if (!constraints) return;
            for (const [field, rawVal] of Object.entries(constraints)) {
                let v = rawVal;
                if (config.fields[field]?.category === 'latency') {
                    v = config.fields[field].unit === 'ms' ? (1000 / rawVal) : (1 / rawVal);
                }
                if (field === yAxis) {
                    const xMin = Math.min(...transformedData.map(d => d[xAxis]));
                    const xMax = Math.max(...transformedData.map(d => d[xAxis]));
                    const r = xMax - xMin;
                    traces.push({ x: [xMin - r * 0.1, xMax + r * 0.1], y: [v, v], mode: 'lines', type: 'scatter', line: { color: '#ef4444', width: 3, dash: 'dash' }, name: `Constraint: ${field} >= ${rawVal}`, hoverinfo: 'skip', showlegend: false });
                } else if (field === xAxis) {
                    const yMin = Math.min(...transformedData.map(d => d[yAxis]));
                    const yMax = Math.max(...transformedData.map(d => d[yAxis]));
                    const r = yMax - yMin;
                    traces.push({ x: [v, v], y: [yMin - r * 0.1, yMax + r * 0.1], mode: 'lines', type: 'scatter', line: { color: '#ef4444', width: 3, dash: 'dash' }, name: `Constraint: ${field} >= ${rawVal}`, hoverinfo: 'skip', showlegend: false });
                }
            }
        }

        function getAxisLabel(metric) {
            const f = config.fields?.[metric];
            if (!f) return metric;
            if (f.category === 'latency') return `1/${f.label} (tokens/s)`;
            return f.label + (f.unit ? ` (${f.unit})` : '');
        }

        function getXAxisLabel(metric) {
            const f = config.fields?.[metric];
            if (!f) return metric;
            const name = f.x_axis_name || f.label || metric;
            const unit = f.x_axis_unit || f.unit || '';
            return name + (unit ? ` (${unit})` : '');
        }

        function getYAxisLabel(metric) {
            const f = config.fields?.[metric];
            if (!f) return metric;
            // Keep original labeling for y-axis
            return f.label + (f.unit ? ` (${f.unit})` : '');
        }

        // Helper function to wrap long text
        function wrapText(text, maxWidth = 50) {
            if (!text || text.length <= maxWidth) return text;

            const words = text.split(' ');
            const lines = [];
            let currentLine = '';

            words.forEach(word => {
                if ((currentLine + word).length <= maxWidth) {
                    currentLine += (currentLine ? ' ' : '') + word;
                } else {
                    if (currentLine) lines.push(currentLine);
                    currentLine = word;
                }
            });

            if (currentLine) lines.push(currentLine);
            return lines.join('<br>');
        }

        function generateHoverText(point) {
            if (!point) return '';

            const grouped = {
                'results': [],
                'server_args': [],
                'client_args': [],
                'command': []
            };

            // Add results
            if (point.results) {
                Object.entries(point.results).forEach(([key, value]) => {
                    if (value !== undefined && value !== null) {
                        const field = config.fields?.[key];
                        const label = field?.label || key;
                        const unit = field?.unit || '';
                        const num = Number(value);
                        const displayValue = isFinite(num) ? num.toFixed(2) : value;
                        grouped.results.push({ label, value: displayValue, unit: unit ? ` ${unit}` : '' });
                    }
                });
            }

            // Add client args
            if (point.config?.client_args) {
                Object.entries(point.config.client_args).forEach(([key, value]) => {
                    if (value !== undefined && value !== null && value !== Infinity) {
                        const label = key.replace(/_/g, ' ');
                        grouped.client_args.push({ label, value: String(value), unit: '' });
                    }
                });
            }

            // Add server args
            if (point.config?.server_args) {
                Object.entries(point.config.server_args).forEach(([key, value]) => {
                    if (value !== undefined && value !== null) {
                        const label = key.replace(/_/g, ' ');
                        grouped.server_args.push({ label, value: String(value), unit: '' });
                    }
                });
            }

            // Add command
            if (point.cmd) {
                grouped.command.push({ label: 'Command', value: point.cmd, unit: '' });
            }

            let text = '';
            // Define desired order: results first, then server_args, then client_args
            const categoryOrder = ['results', 'server_args', 'client_args', 'command'];

            categoryOrder.forEach(cat => {
                const fields = grouped[cat];
                if (!fields || fields.length === 0) return;

                const catLabel = fieldCategories?.[cat]?.label || cat;
                text += `<b>${catLabel}:</b><br>`;
                fields.forEach(({ label, value, unit }) => {
                    // Handle special case for cmd field which can be very long
                    if (label === 'cmd' || label === 'Command') {
                        const wrappedCmd = wrapText(`${value}${unit}`, 60);
                        text += `  ${label}: ${wrappedCmd}<br>`;
                    } else {
                        text += `  ${label}: ${value}${unit}<br>`;
                    }
                });
                text += '<br>';
            });

            return text;
        }

        function getLegendValues(dataset) {
            const colorBy = defaults?.colorBy || 'framework';
            const labels = Array.from(new Set(dataset.map(d => d[colorBy]).filter(v => v != null))).sort();
            const header = config.fields?.[colorBy]?.label || colorBy;
            return { field: colorBy, header, labels };
        }

        function formatFirstConstraints() {
            if (!constraints) return 'None';
            const fmt = (c) => {
                if (!c) return '';
                if (typeof c === 'object' && !Array.isArray(c)) {
                    if ('name' in c && 'value' in c) {
                        return `${c.name} ${c.op || '>='} ${c.value}`;
                    }
                }
                return String(c);
            };
            if (Array.isArray(constraints)) {
                const first = constraints[0];
                if (Array.isArray(first)) return first.map(fmt).filter(Boolean).join(', ');
                return fmt(first);
            }
            if (typeof constraints === 'object') {
                return Object.entries(constraints).map(([k, v]) => `${k} >= ${v}`).join(', ');
            }
            return String(constraints);
        }

        function formatConstraintsList() {
            if (!constraints) return [];
            const fmt = (c) => {
                if (!c) return '';
                if (typeof c === 'object' && !Array.isArray(c)) {
                    if ('name' in c && 'value' in c) return `${c.name} ${c.op || '>='} ${c.value}`;
                    return JSON.stringify(c);
                }
                return String(c);
            };
            if (Array.isArray(constraints)) {
                return constraints.map(fmt).filter(Boolean);
            }
            if (typeof constraints === 'object') {
                return Object.entries(constraints).map(([k, v]) => `${k} >= ${v}`);
            }
            return [String(constraints)];
        }

        // AddConstraintForm component for adding custom constraints
        function AddConstraintForm({ onAdd, onCancel }) {
            const [metric, setMetric] = useState('mean_ttft_ms');
            const [operator, setOperator] = useState('<=');
            const [value, setValue] = useState('');
            const [error, setError] = useState('');

            const relevantOperators = getRelevantOperators(metric);

            const handleAdd = () => {
                const numValue = parseFloat(value);
                if (isNaN(numValue) || numValue <= 0) {
                    setError('Please enter a valid positive number');
                    return;
                }

                const constraint = { name: metric, op: operator, value: numValue };
                onAdd(constraint);
                onCancel();
            };

            return React.createElement('div', { className: 'border border-blue-300 rounded-lg p-3 bg-blue-50 space-y-3' }, [
                React.createElement('div', { key: 'title', className: 'text-sm font-medium text-blue-900' }, 'Add Constraint'),
                React.createElement('div', { key: 'form', className: 'flex flex-wrap gap-2 items-end' }, [
                    // Metric dropdown
                    React.createElement('select', {
                        value: metric,
                        onChange: e => setMetric(e.target.value),
                        className: 'text-xs border border-gray-300 rounded px-2 py-1'
                    }, getConstraintFieldOptions().map(opt =>
                        React.createElement('option', { key: opt.value, value: opt.value }, opt.label)
                    )),
                    // Operator dropdown
                    React.createElement('select', {
                        value: operator,
                        onChange: e => setOperator(e.target.value),
                        className: 'text-xs border border-gray-300 rounded px-2 py-1'
                    }, relevantOperators.map(op =>
                        React.createElement('option', { key: op.value, value: op.value }, op.label)
                    )),
                    // Value input
                    React.createElement('div', { className: 'flex items-center' }, [
                        React.createElement('input', {
                            type: 'number',
                            value: value,
                            onChange: e => setValue(e.target.value),
                            placeholder: '300',
                            className: 'text-xs border border-gray-300 rounded px-2 py-1 w-20'
                        }),
                        React.createElement('span', { className: 'text-xs text-gray-600 ml-1' }, 'ms')
                    ])
                ]),
                error && React.createElement('div', { key: 'error', className: 'text-xs text-red-600' }, error),
                React.createElement('div', { key: 'buttons', className: 'flex gap-2' }, [
                    React.createElement('button', {
                        onClick: onCancel,
                        className: 'text-xs px-3 py-1 border border-gray-300 rounded hover:bg-gray-50'
                    }, 'Cancel'),
                    React.createElement('button', {
                        onClick: handleAdd,
                        className: 'text-xs px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600'
                    }, 'Add')
                ])
            ]);
        }

        function useTransformedData(data, xAxis, yAxis) {
            return useMemo(() => {
                return data
                    .filter(p => {
                        const xVal = getNestedValue(p, xAxis);
                        const yVal = getNestedValue(p, yAxis);
                        return xVal !== undefined && yVal !== undefined;
                    })
                    .map(p => {
                        const xVal = getNestedValue(p, xAxis);
                        const yVal = getNestedValue(p, yAxis);

                        // Create flat object for chart with x and y values
                        const t = {
                            [xAxis]: xVal,
                            [yAxis]: yVal,
                            _original: p
                        };

                        // Transform latency values if needed
                        const f = config.fields?.[xAxis];
                        if (f?.category === 'latency' && xVal > 0) {
                            t[xAxis] = f.unit === 'ms' ? (1000 / xVal) : (1 / xVal);
                        }

                        return t;
                    });
            }, [data, xAxis, yAxis]);
        }

        function Chart({ dataset, xAxis, yAxis, showLines, showPoints, onSelect, constraints: dynamicConstraints }) {
            const ref = useRef(null);
            useEffect(() => {
                if (!dataset || dataset.length === 0) {
                    if (ref.current) ref.current.innerHTML = '<p class="text-center text-slate-500 py-12">No valid data to display</p>';
                return;
            }

                const dom = ref.current;
                const chart = echarts.init(dom);

                const pts = dataset.map(d => ({ x: d[xAxis], y: d[yAxis], original: d }));
                const pareto = getParetoPoints(pts);
                const paretoSet = new Set(pareto.map(p => p.original));
                const paretoData = dataset.filter(d => paretoSet.has(d));
                const nonParetoData = dataset.filter(d => !paretoSet.has(d));

                const series = [];
            if (showLines && paretoData.length > 1) {
                    const sorted = [...paretoData].sort((a, b) => a[xAxis] - b[xAxis]);
                    series.push({
                        type: 'line', name: 'Pareto front', smooth: 0.2, symbol: 'none',
                        lineStyle: { color: '#0e7a66', width: 3 },
                        areaStyle: { color: 'rgba(16,185,129,0.06)' },
                        silent: true,
                        z: 0,
                        data: sorted.map(d => [d[xAxis], d[yAxis]])
                    });
                }
                if (showPoints) {
                    if (paretoData.length) {
                        const withC = paretoData.map(d => ({ d, ok: checkConstraints(d._original, dynamicConstraints) }));
                        const sat = withC.filter(p => p.ok).map(({ d }) => d);
                        const uns = withC.filter(p => !p.ok).map(({ d }) => d);
                        if (sat.length) series.push({
                            type: 'scatter', name: 'Pareto + Constraints', symbol: 'circle', symbolSize: 13,
                            zlevel: 3,
                            itemStyle: { color: '#10b981', borderColor: '#a7f3d0', borderWidth: 2 },
                            emphasis: { scale: 1.15, focus: 'series' },
                            tooltip: {
                                trigger: 'item',
                                backgroundColor: 'rgba(0,0,0,0)',
                                borderWidth: 0,
                                padding: 0,
                                extraCssText: 'background: linear-gradient(180deg, #22c55e 0%, #065f46 85%, #000000 100%); border-radius: 10px; padding: 12px; color: #ffffff; word-wrap: break-word; white-space: normal;',
                                formatter: (p) => {
                                    const d = p.data?.__row;
                                    const txt = d ? generateHoverText(d._original || d) : '';
                                    const title = '<span style=\'color:#dcfce7;font-weight:800\'>Pareto ✓ (constraints)</span>';
                                    return `<div style=\'color:#ffffff;max-width:360px;letter-spacing:.2px;word-wrap:break-word;white-space:normal;\'>${title}<div style=\'margin-top:8px;\'>${txt}</div></div>`;
                                }
                            },
                            z: 3,
                            data: sat.map(d => ({ value: [d[xAxis], d[yAxis]], __row: d, tooltip: { formatter: () => generateHoverText(d._original || d) } }))
                        });
                        if (uns.length) series.push({
                            type: 'scatter', name: 'Pareto', symbolSize: 13,
                            itemStyle: { color: '#0284c7', borderColor: '#fff', borderWidth: 2 },
                            emphasis: { scale: 1.05, focus: 'series' },
                            tooltip: {
                                trigger: 'item',
                                backgroundColor: 'rgba(0,0,0,0)',
                                borderWidth: 0,
                                padding: 0,
                                extraCssText: 'background: linear-gradient(180deg, #0ea5e9 0%, #0369a1 35%, #000000 100%); border-radius: 10px; padding: 12px; color: #ffffff; word-wrap: break-word; white-space: normal;',
                                formatter: (p) => {
                                    const d = p.data?.__row;
                                    const txt = d ? generateHoverText(d._original || d) : '';
                                    const title = '<span style=\'color:#eafff7;font-weight:800\'>Pareto</span>';
                                    return `<div style=\'color:#ffffff;max-width:360px;letter-spacing:.2px;word-wrap:break-word;white-space:normal;\'>${title}<div style=\'margin-top:8px;\'>${txt}</div></div>`;
                                }
                            },
                            z: 2,
                            data: uns.map(d => ({ value: [d[xAxis], d[yAxis]], __row: d, tooltip: { formatter: () => generateHoverText(d._original || d) } }))
                        });
                    }
                    if (nonParetoData.length) series.push({
                        type: 'scatter', name: 'Others', symbolSize: 10,
                        itemStyle: { color: '#94a3b8', borderColor: '#64748b', borderWidth: 1 },
                        emphasis: { scale: 1.05, focus: 'series' },
                                                    tooltip: {
                                trigger: 'item',
                                backgroundColor: 'rgba(0,0,0,0)',
                                borderWidth: 0,
                                padding: 0,
                                extraCssText: 'background: linear-gradient(180deg, #9ca3af 0%, #374151 90%, #1F2937 100%);border-radius: 10px; padding: 12px; color: #ffffff; word-wrap: break-word; white-space: normal;',
                                formatter: (p) => { const d = p.data?.__row; const txt = d ? generateHoverText(d._original || d) : ''; const label = '<span style=\'color:#ffffff;font-weight:700\'>Non‑Pareto</span>'; return `<div style=\'color:#ffffff;max-width:320px;word-wrap:break-word;white-space:normal;\'>${label}<div style=\'margin-top:6px;\'>${txt}</div></div>`; }
                            },
                        z: 1,
                        data: nonParetoData.map(d => ({ value: [d[xAxis], d[yAxis]], __row: d, tooltip: { formatter: () => generateHoverText(d._original || d) } }))
                    });
                }

                const option = {
